services:
  - type: web
    name: ai-assistant-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: REDIS_HOST
        fromService:
          type: redis
          name: ai-assistant-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: ai-assistant-redis
          property: port
      - key: GOOGLE_REDIRECT_URI
        value: https://ai-assistant-backend.onrender.com/auth/callback
      - key: CORS_ORIGINS
        value: '["https://ai-assistant.vercel.app"]'

  - type: redis
    name: ai-assistant-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
